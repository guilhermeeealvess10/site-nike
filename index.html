<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike - Checkpoint 2</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <header>
        <img src="imagem/logonike.jpg" alt="Logotipo da Nike" class="logo">
        <nav>
            <ul>
                <li><a href="#">Novidades e destaques</a></li>
                <li><a href="#">Homens</a></li>
                <li><a href="#">Mulheres</a></li>
                <li><a href="#">Crianças</a></li>
                <li><a href="#">Oferta</a></li>
                <li><a href="#">SNKRS</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="hero">
            <div class="cards-container">
                <article class="card">
                    <img src="imagem/atleta1.jpg" alt="Atleta de Basquete">
                </article>
                <article class="card">
                    <img src="imagem/atleta2.jpg" alt="Atleta de Basquete">
                </article>
                <article class="card">
                    <img src="imagem/atleta3.jpg" alt="Atleta de Basquete">
                </article>
            </div>
            <div class="hero-text">
                <h1>O icônico amarelo-canário está de volta.</h1>
                <div class="buttons">
                    <button class="btn-primary">Comprar Agora</button>
                    <button class="btn-secondary">Saiba Mais</button>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Nike, Inc. Todos os direitos reservados.</p>
    </footer>
</body>
</html>

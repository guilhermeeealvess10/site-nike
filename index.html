<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike - Checkpoint 2</title>
    <link rel="stylesheet" href="imagem/css/estilo.css">
</head>
<body>
    <header>
        <img src="imagem/logonike.jpg" alt="Logo Nike" class="logo"> 
        <nav>
            <ul>
                <li>New & Featured</li>
                <li>Men</li>
                <li>Women</li>
                <li>Kids</li>
                <li>Sale</li>
                <li>SNKRS</li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <!-- Container dos cards de atletas do seu Figma -->
            <div class="cards-container">
                <article class="card">
                    <img src="imagem/atleta1.jpg" alt="Atleta de Basquete">
                </article>
                <article class="card">
                    <img src="imagem/atleta2.jpg" alt="Atleta de Basquete">
                </article>
                <article class="card">
                    <img src="imagem/atleta3.jpg" alt="Atleta de Basquete">
                </article>
            </div>
            
            <div class="hero-text">
                <h1>O icônico amarelo-canário está de volta.</h1>
                <div class="buttons">
                    <button class="btn-primary">Comprar Agora</button>
                    <button class="btn-secondary">Saiba Mais</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Nike, Inc. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
